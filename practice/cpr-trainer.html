<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trình Huấn Luyện Ép Tim CPR 30:2</title>
  
  <!-- Google Fonts: Be Vietnam Pro -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,300;1,400;1,500;1,600;1,700;1,800&display=swap" rel="stylesheet">
  
  <link rel="stylesheet" href="./cpr-trainer.css">
</head>
<body>
  <div class="trainer-card">
    
    <!-- State Status & Progress -->
    <div class="status-indicator">
      <span class="status-badge idle" id="trainer-status">CHỜ BẮT ĐẦU</span>
    </div>

    <!-- Cycle & Compression Counter -->
    <div class="counter-display">
      <div class="counter-box">
        <span class="counter-label">Số Lần Ép Tim</span>
        <span class="counter-value" id="compression-count">0 / 30</span>
      </div>
      <div class="counter-box">
        <span class="counter-label">Chu Kỳ Hoàn Thành</span>
        <span class="counter-value" id="cycle-count">0</span>
      </div>
    </div>

    <!-- Main CPR Interaction Button -->
    <div class="chest-button-wrapper">
      <div class="pulse-glow-ring" id="pulse-ring"></div>
      <button class="chest-button" id="tap-btn" disabled>
        <svg viewBox="0 0 100 100" class="ribcage-svg">
          <circle cx="50" cy="50" r="45" fill="rgba(15, 23, 42, 0.95)" stroke="var(--primary-color)" stroke-width="3" />
          <path d="M50 15 v70 M25 35 H75 M20 50 H80 M25 65 H75" stroke="#334155" stroke-width="4" stroke-linecap="round"/>
          <g transform="translate(35, 30) scale(0.6)" fill="var(--primary-color)">
            <path d="M26 12a3 3 0 0 1 3 3v8h-3v-8a3 3 0 0 1 3-3zm-6-2a3 3 0 0 1 3 3v10h-3V13a3 3 0 0 1 3-3zm-6 2a3 3 0 0 1 3 3v8h-3v-8a3 3 0 0 1 3-3zm18 4a3 3 0 0 1 3 3v4h-3v-4a3 3 0 0 1 3-3zm-26 2c0 .9.3 1.7.8 2.3l6.5 7.8c.8.9 1.9 1.4 3 1.4h11.2a4 4 0 0 0 4-4v-5.2c0-1.1-.9-2-2-2H23c-.6 0-1-.4-1-1v-2.3c0-.6.4-1 1-1h1.5l1.6-4c.4-.9 1.3-1.5 2.3-1.5h.7c1.3 0 2.4.9 2.7 2.1l1.5 6.4h2.7v-1.7c0-2 1.6-3.7 3.7-3.7h.5a3.7 3.7 0 0 1 3.7 3.7v3.4h1.6c1.1 0 2 .9 2 2v6c0 3.3-2.7 6-6 6H20.5c-2.3 0-4.5-1-6.1-2.8L7.8 24.3c-1-1.2-1-3 .2-4.1 1.2-1 3-.8 4.1.4l2.4 2.9-.5-5.5z"/>
          </g>
        </svg>
        
        <!-- Live Action Text Overlay -->
        <div class="tap-text" id="action-prompt">BẤM BẮT ĐẦU</div>
      </button>
      
      <!-- Breath phase overlay overlay -->
      <div class="breath-overlay" id="breath-overlay">
        <div class="breath-icon">💨</div>
        <div class="breath-title">HÀ HƠI THỔI NGẠT</div>
        <div class="breath-sub">Bóp mũi, bịt miệng và thổi vào phổi 2 lần!</div>
        <div class="breath-timer" id="breath-timer">5</div>
      </div>
    </div>

    <!-- Live Performance Stats -->
    <div class="stats-row">
      <div class="stat-item">
        <span class="stat-label">Nhịp độ gõ</span>
        <span class="stat-val">110 BPM</span>
      </div>
      <div class="stat-item">
        <span class="stat-label">Độ chuẩn khớp</span>
        <span class="stat-val" id="sync-accuracy">--%</span>
      </div>
    </div>

    <!-- Instruction Help Bar -->
    <div class="instruction-box" id="instruction-text">
      Nhấn nút Bắt đầu để tập luyện. Nghe nhịp gõ gỗ để nhấn chìm ngực giả lập theo đúng nhịp độ.
    </div>

    <!-- Game Control Buttons -->
    <div class="control-panel">
      <button class="btn btn-secondary" id="reset-btn">Đặt lại</button>
      <button class="btn btn-primary" id="start-btn">Bắt đầu tập</button>
    </div>
  </div>

  <script src="./cpr-trainer.js"></script>
</body>
</html>
